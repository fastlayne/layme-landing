<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>"Layme" - Uncensored AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(to bottom, #e7d9c4, #f3f0e8);
      background-image: url('https://www.transparenttextures.com/patterns/clouds.png');
      background-repeat: repeat;
      background-size: 400px;
      color: #3b2f2f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    
    .hero {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      margin: 0.3em 0 0.5em;
      line-height: 1.1;
      color: #3b2f2f;
    }
    
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.5em 0 1.5em;
    }
    
    .logo-img {
      height: 20rem;
      width: auto;
      filter: drop-shadow(6px 6px 12px rgba(0,0,0,0.2));
    }
    
    .content {
      font-size: 1.25rem;
      max-width: 700px;
      margin-bottom: 2em;
      line-height: 1.6;
    }
    
    .cloud-box {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 3em;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease-in-out;
      position: relative;
      max-width: 800px;
      width: 90%;
    }
    
    .cloud-box:hover {
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      transform: translateY(-2px);
    }
    
    .warning {
      font-size: 0.95rem;
      color: #888;
      margin-top: 2em;
    }
    
    .tagline {
      font-size: 1.1rem;
      color: #444;
      font-style: italic;
      margin-top: 0.5em;
    }
    
    .footer {
      margin-top: 3em;
      font-size: 0.9rem;
      color: #665f5f;
      opacity: 0.8;
    }
    
    /* Responsive design */
    @media (max-width: 768px) {
      .hero {
        font-size: 6rem;
      }
      .logo-img {
        height: 8rem;
      }
      .cloud-box {
        padding: 2em;
        margin: 1em;
      }
    }
  </style>
</head>
<body>
  <div class="cloud-box">
    <h1 class="hero">Introducing</h1>
    
    <div class="logo-container">
      <img src="./layme-logo-colored.png" alt="Layme" class="logo-img" />
    </div>
    
    <div class="content">
      <p>
        <strong>Model Version: v1</strong><br>
        Bold. Honest. Unfiltered.<br />
        <strong>Uncensored AI</strong> — always unbiased, never judgmental.
      </p>
      
      <p style="font-style: italic; color: #666;">
        Coming soon to justlay.me
      </p>
      
      <div class="warning">
        ⚠️ Mature content. For users 18+ only.<br>
        <span class="tagline">this ain't ya mamma's ChatGPT</span>
      </div>
    </div>
  </div>
  
  <div class="footer">
    © 2025 justlay.me — All rights reserved.
  </div>
</body>
</html>
