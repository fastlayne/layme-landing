<!DOCTYPE html>
<html lang="en">
<head>

  <title>"Layme" - Uncensored AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(to bottom, #e7d9c4, #f3f0e8);
      background-image: url('https://www.transparenttextures.com/patterns/clouds.png');
      background-repeat: repeat;
      background-size: 400px;
      color: #3b2f2f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .hero {
      font-family: 'Playfair Display', serif;
      font-size: 9rem;

    }
    p {
      font-size: 1.25rem;
      max-width: 700px;
      margin-bottom: 2em;
    }
    .cloud-box {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 2.5em;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease-in-out;
      position: relative;
    }
    .cloud-box:hover {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    .logo {
      position: absolute;
      top: 1.2em;
      right: 1.5em;
      opacity: 0.25;
      width: 60px;
      height: auto;
      image-rendering: pixelated;
    }
    .footer {
      margin-top: 3em;
      font-size: 0.9rem;
      color: #665f5f;
    }
  </style>
</head>
<body>
  <div class="cloud-box">

  </div>
  <div class="footer">
    &copy; 2025 justlay.me — All rights reserved.

</html>
